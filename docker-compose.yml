version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: aether_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - aether-network

  server:
    build: ./server
    container_name: aether_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/aetherchat
      - JWT_SECRET=production_ready_super_secret_key_987654321_aether
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - aether-network

  client:
    build: ./client
    container_name: aether_client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - aether-network

volumes:
  mongo-data:

networks:
  aether-network:
    driver: bridge
